<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Médicos - MedFlow</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            🏥 MedFlow
        </div>

        <div class="menu">
            <a href="/">Início</a>
            <a href="/pacientes">Pacientes</a>
            <a href="/medicos">Médicos</a>
            <a href="/consultas">Consultas</a>
        </div>

    </nav>

    <section class="hero">

        <h1>Médicos cadastrados</h1>

        <p>
            Gerenciamento completo da equipe médica.
        </p>

        <a href="/novo-medico" class="btn">
         ➕ Novo Médico
       </a>

        <div class="tabela-container">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Especialidade</th>
                        <th>Telefone</th>
                    </tr>
                </thead>

                <tbody>

                    {% for medico in medicos %}

                    <tr>
                        <td>{{ medico.id }}</td>
                        <td>{{ medico.nome }}</td>
                        <td>{{ medico.especialidade }}</td>
                        <td>{{ medico.telefone }}</td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </section>

</body>
</html>
