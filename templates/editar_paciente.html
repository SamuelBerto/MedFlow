<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Paciente - MedFlow</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar">
        <div class="logo">🏥 MedFlow</div>

        <div class="menu">
            <a href="/">Início</a>
            <a href="/pacientes">Pacientes</a>
            <a href="/medicos">Médicos</a>
            <a href="/consultas">Consultas</a>
        </div>
    </nav>

    <section class="hero">

        <h1>Editar Paciente</h1>

        <p>Atualização de dados do paciente.</p>

        <form method="POST" class="formulario">

            <input
                type="text"
                name="nome"
                value="{{ paciente[1] }}"
                required
            >

            <input
                type="number"
                name="idade"
                value="{{ paciente[2] }}"
                required
            >

            <input
                type="text"
                name="telefone"
                value="{{ paciente[3] }}"
                required
            >

            <select name="genero" required>

                <option value="masculino"
                    {% if paciente[4] == "masculino" %}selected{% endif %}>
                    Masculino
                </option>

                <option value="feminino"
                    {% if paciente[4] == "feminino" %}selected{% endif %}>
                    Feminino
                </option>

                <option value="outro"
                    {% if paciente[4] == "outro" %}selected{% endif %}>
                    Outro
                </option>

            </select>

            <button type="submit" class="btn">
                💾 Salvar Alterações
            </button>

        </form>

    </section>

</body>
</html>
